<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Logging out of Jellyfin...</title>
</head>

<body>
    <script>
        localStorage.removeItem("jellyfin_credentials");
        localStorage.clear(); // optionally clear everything

        // Derive the API host from the current origin (jellyfin.<domain> ->
        // api.<domain>) so no hostname is hardcoded.
        const currentUrl = new URL(window.location.href);
        const apiHostname = currentUrl.hostname.replace(/^jellyfin\./, 'api.');
        const apiBaseUrl = `${currentUrl.protocol}//${apiHostname}${currentUrl.port ? `:${currentUrl.port}` : ''}`;

        fetch(`${apiBaseUrl}/users/logout-jellyfin`, {
            method: "GET",
            credentials: "include"
        })
            .finally(() => {
                // Done, either close or redirect
                window.close();
            });
    </script>
</body>

</html>
