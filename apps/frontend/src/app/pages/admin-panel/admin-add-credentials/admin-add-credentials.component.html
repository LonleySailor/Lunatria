<div class="glass-card">
  <h2>{{ 'ADMIN.ADD_CREDENTIALS' | translate }}</h2>

  <div class="form-group">
    <label>{{ 'ADMIN.SELECT_SERVICE' | translate }}:</label>
    <select [(ngModel)]="selectedService" (change)="onServiceChange()" name="service">
      <option value="" disabled selected>{{ 'ADMIN.SELECT_SERVICE' | translate }}</option>
      <option *ngFor="let service of services" [value]="service.name">{{ service.label }}</option>
    </select>
  </div>

  <form (ngSubmit)="onSubmit()" #credentialsForm="ngForm" *ngIf="selectedService">

    <div class="form-group">
      <label>{{ 'ADMIN.ASSIGN_TO_USER' | translate }}:</label>
      <select [(ngModel)]="credentials.targetUser" name="targetUser" required>
        <option value="" disabled selected>{{ 'ADMIN.SELECT_USER' | translate }}</option>
        <option *ngFor="let user of users" [value]="user.username">{{ user.username }}</option>
      </select>
      <p class="hint" *ngIf="users.length === 0">{{ 'ADMIN.NO_USERS_AVAILABLE' | translate }}</p>
    </div>

    <div class="form-group toggle-group" *ngIf="currentService?.supportsAutoRegister">
      <label class="toggle-label">
        <input type="checkbox" [(ngModel)]="autoRegister" name="autoRegister" />
        {{ 'ADMIN.AUTO_REGISTER' | translate }}
      </label>
      <p class="hint">{{ 'ADMIN.AUTO_REGISTER_HINT' | translate }}</p>
    </div>

    <ng-container *ngIf="!autoRegister">
      <div class="form-group">
        <label>{{ 'ADMIN.USERNAME' | translate }}:</label>
        <input type="text" [(ngModel)]="credentials.username" name="username" required />
      </div>

      <div class="form-group">
        <label>{{ 'ADMIN.PASSWORD' | translate }}:</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required />
      </div>
    </ng-container>

    <div class="form-group" *ngIf="serviceRequiresEmail()">
      <label>{{ 'ADMIN.EMAIL' | translate }}:</label>
      <input type="email" [(ngModel)]="credentials.email" name="email" />
    </div>

    <button type="submit" [disabled]="!credentialsForm.form.valid">
      {{ 'ADMIN.SAVE_CREDENTIALS' | translate }}
    </button>
  </form>
</div>

<app-confirm-dialog
  [open]="confirmOpen"
  [message]="'ADMIN.CONFIRM_SAVE' | translate"
  (confirm)="onConfirmSave()"
  (cancel)="onCancelConfirm()"
></app-confirm-dialog>
