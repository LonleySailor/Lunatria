map $host $service_domain {
    default sonarr.lunatria.com;
}

map $host $service_slug {
    default sonarr;
}

map $host $service_internal_upstream {
    default http://192.168.33.26:8989;
}

map $host $service_bridge_upstream {
    default http://192.168.33.54:3000;
}

map $host $service_bridge_path {
    default /sonarr/;
}

map $host $portal_base_url {
    default https://lunatria.com;
}

server {
    if ($host = $service_domain) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name sonarr.lunatria.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://$host$request_uri;


}

map $http_cookie $is_sonarr_authenticated {
    default 0;
    ~*sonarr_auth=true 1;
}

server {
    listen 443 ssl;
    server_name sonarr.lunatria.com;



     location = /logout {

    proxy_pass $service_internal_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }

    location / {
        error_page 401 = @handle_unauth;
        if ($is_sonarr_authenticated) {
            proxy_pass $service_internal_upstream;
        }

        proxy_pass $service_bridge_upstream$service_bridge_path;
        proxy_intercept_errors on;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @handle_unauth {
        return 302 $portal_base_url/unauthorized?source=$service_slug;
    }
}